openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AfriLance freelance marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profiles
  - name: jobs
    description: Job listings
  - name: proposals
    description: Job proposals
  - name: messages
    description: Messaging
  - name: notifications
    description: Notifications
  - name: reviews
    description: Reviews and ratings
  - name: dashboard
    description: Dashboard summaries
  - name: payments
    description: Mock payment transactions
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Profiles
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
    put:
      operationId: upsertMyProfile
      tags: [profiles]
      summary: Create or update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a profile by user ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found

  /profiles/freelancers:
    get:
      operationId: listFreelancers
      tags: [profiles]
      summary: List freelancer profiles with filters
      parameters:
        - name: skill
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: minRate
          in: query
          schema:
            type: number
        - name: maxRate
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of freelancers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerListResponse"

  # Jobs
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job listings with filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: skill
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: remote
          in: query
          schema:
            type: boolean
        - name: minBudget
          in: query
          schema:
            type: number
        - name: maxBudget
          in: query
          schema:
            type: number
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/my:
    get:
      operationId: listMyJobs
      tags: [jobs]
      summary: List jobs posted by the current client
      responses:
        "200":
          description: My jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  # Proposals
  /proposals:
    get:
      operationId: listMyProposals
      tags: [proposals]
      summary: List proposals submitted by the current freelancer
      responses:
        "200":
          description: My proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalListResponse"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Submit a proposal for a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalBody"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get a proposal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
    patch:
      operationId: updateProposalStatus
      tags: [proposals]
      summary: Update a proposal status (accept/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalStatusBody"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /jobs/{jobId}/proposals:
    get:
      operationId: listJobProposals
      tags: [proposals]
      summary: List proposals for a specific job (client view)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalListResponse"

  # Messages
  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations for the current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"

  /messages/conversations/{conversationId}:
    get:
      operationId: getConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read

  # Reviews
  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review for a completed job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/profile/{profileId}:
    get:
      operationId: listProfileReviews
      tags: [reviews]
      summary: Get reviews for a profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"

  # Dashboard
  /dashboard/freelancer:
    get:
      operationId: getFreelancerDashboard
      tags: [dashboard]
      summary: Get freelancer dashboard summary
      responses:
        "200":
          description: Freelancer dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerDashboard"

  /dashboard/client:
    get:
      operationId: getClientDashboard
      tags: [dashboard]
      summary: Get client dashboard summary
      responses:
        "200":
          description: Client dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDashboard"

  # Payments (mock)
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payment transactions for current user
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Initiate a mock payment (escrow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/release:
    patch:
      operationId: releasePayment
      tags: [payments]
      summary: Release escrowed funds to freelancer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # Saved Jobs
  /saved-jobs:
    get:
      operationId: listSavedJobs
      tags: [jobs]
      summary: List saved jobs for current user
      responses:
        "200":
          description: Saved jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedJobListResponse"
    post:
      operationId: saveJob
      tags: [jobs]
      summary: Save a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveJobBody"
      responses:
        "201":
          description: Job saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedJob"

  /saved-jobs/{jobId}:
    delete:
      operationId: unsaveJob
      tags: [jobs]
      summary: Remove a saved job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unsaved

  # Admin
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/users/{id}/block:
    patch:
      operationId: adminBlockUser
      tags: [admin]
      summary: Admin - block or unblock a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlockUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/verify:
    patch:
      operationId: adminVerifyUser
      tags: [admin]
      summary: Admin - set verified/top-rated status on a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVerifyUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [admin]
      summary: Admin - list all jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: flagged
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /admin/jobs/{id}/flag:
    patch:
      operationId: adminFlagJob
      tags: [admin]
      summary: Admin - flag or unflag a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFlagBody"
      responses:
        "200":
          description: Job flagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin - platform stats overview
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        role:
          type: string
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        hourlyRate:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        portfolioItems:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioItem"
        avgRating:
          type: ["number", "null"]
        totalReviews:
          type: integer
        featured:
          type: boolean
        isBlocked:
          type: boolean
        isVerified:
          type: boolean
        isTopRated:
          type: boolean
        completedJobs:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - userId
        - role
        - name
        - skills
        - portfolioItems
        - totalReviews
        - featured
        - isBlocked
        - isVerified
        - isTopRated
        - completedJobs
        - createdAt

    PortfolioItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        projectUrl:
          type: ["string", "null"]
      required:
        - id
        - title

    UpsertProfileBody:
      type: object
      properties:
        role:
          type: string
        name:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        skills:
          type: array
          items:
            type: string
        hourlyRate:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        portfolioItems:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioItem"
      required:
        - role
        - name

    FreelancerListResponse:
      type: object
      properties:
        freelancers:
          type: array
          items:
            $ref: "#/components/schemas/Profile"
        total:
          type: integer
      required:
        - freelancers
        - total

    Job:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        skills:
          type: array
          items:
            type: string
        budgetMin:
          type: ["number", "null"]
        budgetMax:
          type: ["number", "null"]
        budgetType:
          type: string
        location:
          type: ["string", "null"]
        remote:
          type: boolean
        deadline:
          type: ["string", "null"]
        status:
          type: string
        isFlagged:
          type: boolean
        proposalCount:
          type: integer
        clientName:
          type: ["string", "null"]
        clientAvatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clientId
        - title
        - description
        - category
        - skills
        - budgetType
        - remote
        - status
        - isFlagged
        - proposalCount
        - createdAt
        - updatedAt

    CreateJobBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        skills:
          type: array
          items:
            type: string
        budgetMin:
          type: ["number", "null"]
        budgetMax:
          type: ["number", "null"]
        budgetType:
          type: string
        location:
          type: ["string", "null"]
        remote:
          type: boolean
        deadline:
          type: ["string", "null"]
      required:
        - title
        - description
        - category
        - skills
        - budgetType
        - remote

    UpdateJobBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        skills:
          type: array
          items:
            type: string
        budgetMin:
          type: ["number", "null"]
        budgetMax:
          type: ["number", "null"]
        budgetType:
          type: string
        location:
          type: ["string", "null"]
        remote:
          type: boolean
        deadline:
          type: ["string", "null"]
        status:
          type: string

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
      required:
        - jobs
        - total

    Proposal:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        freelancerId:
          type: integer
        coverLetter:
          type: string
        bidAmount:
          type: number
        status:
          type: string
        freelancerName:
          type: ["string", "null"]
        freelancerAvatarUrl:
          type: ["string", "null"]
        freelancerLocation:
          type: ["string", "null"]
        freelancerSkills:
          type: array
          items:
            type: string
        freelancerAvgRating:
          type: ["number", "null"]
        jobTitle:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - jobId
        - freelancerId
        - coverLetter
        - bidAmount
        - status
        - freelancerSkills
        - createdAt
        - updatedAt

    CreateProposalBody:
      type: object
      properties:
        jobId:
          type: integer
        coverLetter:
          type: string
        bidAmount:
          type: number
      required:
        - jobId
        - coverLetter
        - bidAmount

    UpdateProposalStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ProposalListResponse:
      type: object
      properties:
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/Proposal"
        total:
          type: integer
      required:
        - proposals
        - total

    Conversation:
      type: object
      properties:
        id:
          type: integer
        otherUserId:
          type: integer
        otherUserName:
          type: string
        otherUserAvatarUrl:
          type: ["string", "null"]
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        unreadCount:
          type: integer
      required:
        - id
        - otherUserId
        - otherUserName
        - unreadCount

    ConversationListResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
      required:
        - conversations

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - senderId
        - content
        - isRead
        - createdAt

    MessageListResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        total:
          type: integer
      required:
        - messages
        - total

    SendMessageBody:
      type: object
      properties:
        recipientId:
          type: integer
        content:
          type: string
      required:
